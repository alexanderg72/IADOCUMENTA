<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - DUCA Check PRO</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f3f4f6;
            margin: 0;
        }

        .header {
            background: #1f2937;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #FF0000;
        }

            .header button {
                background: white;
                color: #1f2937;
                border: none;
                padding: 8px 15px;
                border-radius: 5px;
                cursor: pointer;
                font-weight: bold;
                margin-left: 10px;
            }

                .header button:hover {
                    background: #e5e7eb;
                }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #f9fafb;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        input, select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex: 1;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f3f4f6;
            color: #374151;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

            .badge.admin {
                background: #fef08a;
                color: #854d0e;
            }

            .badge.user {
                background: #dbeafe;
                color: #1e40af;
            }
    </style>
</head>
<body>

    <div class="header">
        <h2>🛡️ Panel de Administración</h2>
        <div>
            <button onclick="window.location.href='index.html'">📄 Usar Validador DUCA</button>
            <button onclick="cerrarSesion()" style="color: #ef4444;">Cerrar Sesión</button>
        </div>
    </div>

    <div class="container">
        <h3>Agregar Nuevo Usuario</h3>
        <div class="form-row">
            <input type="text" id="newUser" placeholder="Nombre de usuario" required>
            <input type="password" id="newPass" placeholder="Contraseña" required>
            <select id="newRole">
                <option value="User">Usuario Normal</option>
                <option value="Admin">Administrador</option>
            </select>
            <button class="btn-primary" onclick="crearUsuario()">Guardar</button>
        </div>

        <h3>Usuarios Registrados</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios">
            </tbody>
        </table>
    </div>

    <script>
        // 1. SEGURIDAD: Si no es admin, lo regresamos al login
        if (localStorage.getItem("userRole") !== "Admin") {
            window.location.href = "login.html";
        }

        // 2. Cargar tabla al iniciar
        cargarUsuarios();

        async function cargarUsuarios() {
            const response = await fetch("/api/auth/usuarios");
            const usuarios = await response.json();

            let html = "";
            usuarios.forEach(u => {
                let badgeClass = u.rol === 'Admin' ? 'admin' : 'user';
                html += `
                        <tr>
                            <td>${u.id}</td>
                            <td><strong>${u.nombreUsuario}</strong></td>
                            <td><span class="badge ${badgeClass}">${u.rol}</span></td>
                            <td>${u.activo ? '✅ Activo' : '❌ Inactivo'}</td>
                        </tr>
                    `;
            });
            document.getElementById("tablaUsuarios").innerHTML = html;
        }

        async function crearUsuario() {
            const user = document.getElementById("newUser").value;
            const pass = document.getElementById("newPass").value;
            const rol = document.getElementById("newRole").value;

            if (!user || !pass) return alert("Llena todos los campos");

            const response = await fetch("/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ NombreUsuario: user, Password: pass, Rol: rol })
            });

            if (response.ok) {
                alert("Usuario creado con éxito");
                document.getElementById("newUser").value = "";
                document.getElementById("newPass").value = "";
                cargarUsuarios(); // Recargar tabla
            } else {
                alert("Error: Es posible que el usuario ya exista.");
            }
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
